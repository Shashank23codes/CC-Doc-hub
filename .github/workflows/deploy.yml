name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to your default branch name (e.g. master) if different

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          cd docapp
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docapp/dist # The folder containing compiled static assets
          branch: gh-pages # The branch the action deploys to
